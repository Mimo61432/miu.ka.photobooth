<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Our Photobooth</title>
  <link rel="stylesheet" href="booth.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f6efe8;
      text-align: center;
    }

    video {
      width: 260px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    canvas {
      border-radius: 24px;
      margin-top: 15px;
    }

    .controls {
      margin: 10px 0;
    }

    #stickers {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .sticker-thumb {
      width: 50px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>📸 Our Photobooth</h2>
  <p id="countdown"></p>

  <video id="video" autoplay playsinline></video>

  <div class="controls">
    <button id="startBtn">Start</button>
    <input type="color" id="frameColor" value="#fffd74" />
    <button id="downloadBtn">Download</button>
  </div>

  <canvas id="strip" width="360" height="520"></canvas>

  <div id="stickers"></div>

  <script src="booth.js"></script>
</body>
</html>
