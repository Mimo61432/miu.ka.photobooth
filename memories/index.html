<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Our Photobooth</title>
  <link rel="stylesheet" href="booth.css" />
  <style>
    #video { transform: scaleX(-1); }

    #colors div {
      margin: 4px;
      display: inline-block;
    }

    #stickers img {
      width: 50px;
      cursor: pointer;
      margin: 6px;
    }

    #sizeControl {
      width: 200px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>📸 Our Photobooth</h1>
  <p>Align your face to eye level</p>

  <video id="video" autoplay playsinline></video>

  <div id="countdown"></div>

  <button id="startBtn">Start</button>

  <canvas id="strip" width="320" height="1200"></canvas>

  <h3>Choose Frame Color</h3>
  <div id="colors"></div>

  <h3>Stickers</h3>
  <div id="stickers"></div>

  <h3>Sticker Size</h3>
  <input id="sizeControl" type="range" min="40" max="200" value="80" />

  <script src="booth.js"></script>
</body>
</html>
